name: Publish to npm

on:
  workflow_dispatch:
    inputs:
      deployment_mode:
        description: "Choose dry-run to validate or publish for real deployment."
        required: true
        default: dry-run
        type: choice
        options:
          - dry-run
          - publish
      tag:
        description: "Optional tag override (example: v1.4.0). Leave empty to use v<package.json version>."
        required: false
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Resolve release tag
        id: release_tag
        run: |
          VERSION="$(node -p "require('./package.json').version")"

          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="v${VERSION}"
          fi

          if [[ ! "$TAG" =~ ^v[0-9].* ]]; then
            echo "Resolved tag must start with 'v' (example: v1.4.0), got: $TAG"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_title=Mapp Engage RN - $VERSION" >> "$GITHUB_OUTPUT"
          echo "Using release tag: $TAG"
          echo "Using release title: Mapp Engage RN - $VERSION"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Test
        run: npm test

      - name: Validate package contents
        run: npm pack --dry-run

      - name: Publish to npm (dry-run)
        if: ${{ inputs.deployment_mode == 'dry-run' }}
        run: npm publish --provenance --access public --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish to npm
        if: ${{ inputs.deployment_mode == 'publish' }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Recreate GitHub tag and release
        if: ${{ inputs.deployment_mode == 'publish' }}
        run: |
          TAG="${{ steps.release_tag.outputs.tag }}"
          RELEASE_TITLE="${{ steps.release_tag.outputs.release_title }}"

          git fetch --tags

          while IFS= read -r RELEASE_TAG; do
            if [ -n "$RELEASE_TAG" ]; then
              echo "Deleting existing GitHub release for tag $RELEASE_TAG."
              gh release delete "$RELEASE_TAG" --yes --cleanup-tag
            fi
          done < <(gh release list --limit 1000 --json tagName,name --jq ".[] | select(.tagName == \"$TAG\" or .name == \"$RELEASE_TITLE\") | .tagName")

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Deleting existing local tag $TAG."
            git tag -d "$TAG"
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Deleting existing remote tag $TAG."
            git push origin ":refs/tags/$TAG"
          fi

          git tag "$TAG"
          git push origin "refs/tags/$TAG"

          gh release create "$TAG" \
            --title "$RELEASE_TITLE" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
